name: Daily low-temperature spray dryer intelligence

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report and post to Notion
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
        run: python scripts/daily_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports docs/last-run.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: add daily spray dryer intelligence report"
            git push
          fi
